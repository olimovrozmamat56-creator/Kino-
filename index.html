<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kino Premyera</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #0f172a; color: white; text-align: center; }
        .container { padding: 20px; border-radius: 15px; background: #1e293b; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 90%; max-width: 400px; }
        .btn { display: inline-block; padding: 15px 30px; background-color: #e11d48; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; border: none; margin-top: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        p { color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎬 Kino Tayyor!</h2>
    <p>Kinoni ko'rish uchun pastdagi tugmani bosing. Reklamadan so'ng avtomatik ravishda kinoga o'tasiz.</p>
    
    <button onclick="startProcess()" class="btn">KINO KO'RISHNI BOSHLASH</button>
</div>

<script>
    function startProcess() {
        // 1. LINKDAN KINO MANZILINI OLISH
        const urlParams = new URLSearchParams(window.location.search);
        const movieUrl = urlParams.get('url');

        // 2. MONETAG REKLAMASINI OCHISH (Direct Link'ingizni shu yerga qo'ying)
        // Agarda Direct Link bo'lmasa, hozircha bo'sh qoldiring yoki o'z link'ingizni qo'ying
        window.open("https://omg10.com/4/11008847");
        // 3. 2 SONIYADAN KEYIN KINOGA YUBORISH
        setTimeout(function() {
            if (movieUrl) {
                window.location.href = decodeURIComponent(movieUrl);
            } else {
                // Agar link xato bo'lsa, asosiy kanalingizga yuboradi
                window.location.href = "https://t.me/+bgHe9Z9IIW43YmVi";
            }
        }, 2000);
    }
</script>

</body>
</html>
