<script>
    function startProcess() {
        // 1. Kino linkini olish
        const urlParams = new URLSearchParams(window.location.search);
        let movieUrl = urlParams.get('url');

        // Agar link bo'lmasa, asosiy kanalga yo'naltiramiz
        if (!movieUrl) {
            movieUrl = "https://t.me/+bgHe9Z9IIW43YmVi";
        } else {
            movieUrl = decodeURIComponent(movieUrl);
        }

        // 2. Reklamani ochishga urinish
        try {
            window.open("https://omg10.com/4/11008847", "_blank");
        } catch (e) {
            console.log("Reklama bloklandi, lekin biz davom etamiz...");
        }

        // 3. KAFOLATLANGAN YO'NALTIRISH (3 soniyadan keyin)
        // Reklama ochilsa ham, ochilmasa ham foydalanuvchi kinoga o'tadi
        setTimeout(function() {
            window.location.replace(movieUrl);
        }, 3000); 
    }
</script>
